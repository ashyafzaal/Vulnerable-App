name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🧱 Run Flask app (Docker)
      - name: Build Docker Image
        run: docker build -t flask-vuln-app .

      - name: Run App Container
        run: docker run -d -p 5000:5000 flask-vuln-app

      # 🔍 ZAP Scan (DAST)
      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: 'http://localhost:5000'
